RESEARCH_OBJECTIVES: 'To investigate previous research on deep learning applications
  for skin disease classification, with a focus on eczema/atopic dermatitis detection
  and binary vs. multi-class strategies.

  To preprocess and prepare a public multi-class skin disease image dataset by merging
  the nine non-eczema classes into a single ''other'' category for binary classification
  (eczema vs. non-eczema).

  To analyse, design, and implement a deep learning model using transfer learning
  (e.g., pre-trained CNN architectures such as EfficientNet, ResNet, or DenseNet)
  with data augmentation techniques to handle class imbalance and image variability.

  To explore the possibilities of advanced techniques (e.g., attention mechanisms,
  ensemble methods, or fine-tuning strategies) for improving binary classification
  performance on eczema detection.

  To critically evaluate the end product through quantitative metrics (accuracy, precision,
  recall, F1-score, AUC-ROC) and qualitative analysis (confusion matrices, misclassification
  examples), comparing binary vs. multi-class baselines where feasible.

  To discuss limitations, ethical implications, and potential real-world deployment
  scenarios for the developed model.'
RESEARCH_QUESTION: To what extent can a deep learning-based binary classification
  model accurately distinguish eczema from other common skin diseases using dermoscopic
  images, and how does consolidating diverse non-eczema classes into a single category
  impact model performance, robustness, and generalization compared to traditional
  multi-class approaches?
RESEARCH_QUESTION_OBJECTIVES: InputFiles/rqo.txt
