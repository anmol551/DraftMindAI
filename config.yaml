RESEARCH_OBJECTIVES: '1. To investigate existing research on resume classification
  and information extraction using NLP.

  2. To design and implement a preprocessing pipeline for parsing and cleaning PDF
  resumes.

  3. To extract and prioritise key entities such as skills and education using Named
  Entity Recognition.

  4. To apply TF-IDF with n-grams for feature representation of resumes.

  5. To implement and compare Multinomial Naive Bayes, Bi-LSTM, and DistilBERT models
  for resume classification.

  6. To critically evaluate model performance using standard classification metrics.'
RESEARCH_QUESTION: '1. How does advanced NLP preprocessing impact the accuracy of
  automated resume classification?

  2. How do deep learning models compare to traditional methods for skill-based resume
  categorisation?'
